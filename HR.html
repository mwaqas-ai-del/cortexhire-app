<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CortexHire | HR Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .candidate-card { border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; margin-top: 20px; background: #fff; display: flex; flex-wrap: wrap; gap: 20px; }
        .field-group { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        .status-badge { background: #ffeaa7; color: #d63031; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-send { background: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .btn-send:hover { background: #219150; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2>Pending Offers Dashboard</h2>
    <p>Review candidate details and customize offer parameters before sending.</p>

    <div class="candidate-card">
        <div class="field-group">
            <label>Candidate Name</label>
            <input type="text" id="name" value="Muhammad Waqas" readonly>
        </div>
        <div class="field-group">
            <label>Email Address</label>
            <input type="email" id="email" value="mwaqas-ai@innovativesoftwaresolution.com" readonly>
        </div>
        <div class="field-group">
            <label>Status</label>
            <span class="status-badge">PENDING INTERVIEW</span>
        </div>

        <div style="width: 100%; height: 1px; background: #eee; margin: 10px 0;"></div>

        <div class="field-group">
            <label>Designation</label>
            <input type="text" id="job_title" value="In-Person Interview (Video Editor)">
        </div>
        <div class="field-group">
            <label>Monthly Salary (PKR)</label>
            <input type="number" id="salary" value="40000">
        </div>
        <div class="field-group">
            <label>Joining Date</label>
            <input type="date" id="start_date">
        </div>

        <button class="btn-send" onclick="sendOffer()">🚀 Generate & Send Offer Letter</button>
    </div>
</div>

<script>
    function sendOffer() {
        const data = {
            candidate_name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            salary: document.getElementById('salary').value,
            start_date: document.getElementById('start_date').value,
            job_title: document.getElementById('job_title').value
        };

        if(!data.start_date) {
            alert("Please select a Joining Date first!");
            return;
        }

        console.log("Sending data to n8n:", data);
        
        // n8n Webhook URL yahan dalna hai
        fetch('https://bot.csautomaition.com/n8n-second/webhook-test/send-offer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => alert("Offer Letter has been triggered successfully!"))
        .catch(error => console.error('Error:', error));
    }
</script>

</body>
</html>
