<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h2 { font-family: 'DM Serif Display', serif; }

        body {
            background: #f0ede8;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.08);
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #fafaf9;
            border: 1.5px solid #e8e5e0;
            border-radius: 14px;
            outline: none;
            font-size: 14px;
            color: #1a1a1a;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus {
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26,26,26,0.06);
        }
        .input-field::placeholder { color: #aaa; }

        .upload-zone {
            border: 2px dashed #d5d0c8;
            border-radius: 16px;
            padding: 28px 20px;
            background: #fafaf9;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
        }
        .upload-zone:hover {
            border-color: #1a1a1a;
            background: #f5f3ef;
        }
        .upload-zone.has-file {
            border-color: #22c55e;
            background: #f0fdf4;
        }

        .icon-input {
            position: relative;
        }
        .icon-input svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #aaa;
        }
        .icon-input input {
            padding-left: 44px;
        }

        .submit-btn {
            width: 100%;
            background: #1a1a1a;
            color: white;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .submit-btn:hover { background: #333; }
        .submit-btn:active { transform: scale(0.99); }
        .submit-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .progress-bar-wrap {
            width: 100%;
            background: #e8e5e0;
            border-radius: 99px;
            height: 6px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            background: #1a1a1a;
            border-radius: 99px;
            transition: width 0.3s ease;
            width: 0%;
        }

        label.field-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
            letter-spacing: 0.2px;
        }

        textarea.input-field {
            min-height: 110px;
            resize: vertical;
        }

        .badge {
            display: inline-block;
            background: #f0ede8;
            color: #888;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 99px;
            margin-left: 6px;
            font-weight: 400;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-2xl mx-auto">

        <!-- Header -->
        <div class="text-center mb-8">
            <p class="text-sm text-gray-400 uppercase tracking-widest mb-2 font-medium">We're Hiring</p>
            <h2 id="job-title" class="text-4xl text-gray-900">Loading...</h2>
        </div>

        <div class="card p-8 md:p-10">
            <form id="appForm" class="space-y-6">

                <!-- Name + Email -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="field-label">Full Name <span class="text-red-400">*</span></label>
                        <input type="text" id="full_name" placeholder="John Doe" required class="input-field">
                    </div>
                    <div>
                        <label class="field-label">Email Address <span class="text-red-400">*</span></label>
                        <input type="email" id="email" placeholder="you@email.com" required class="input-field">
                    </div>
                </div>

                <!-- WhatsApp -->
                <div>
                    <label class="field-label">WhatsApp Number <span class="text-red-400">*</span></label>
                    <input type="tel" id="contact" placeholder="+92 300 0000000" required class="input-field">
                </div>

                <!-- Resume Upload -->
                <div>
                    <label class="field-label">Resume <span class="text-red-400">*</span></label>
                    <label for="resume" class="upload-zone block" id="resume-zone">
                        <svg id="upload-icon" class="w-8 h-8 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                        </svg>
                        <p id="resume-label" class="text-sm text-gray-400 font-medium">Click to upload Resume</p>
                        <p class="text-xs text-gray-300 mt-1">PDF, DOC, DOCX supported</p>
                        <input type="file" id="resume" accept=".pdf,.doc,.docx" required class="hidden">
                    </label>
                    <!-- Upload Progress -->
                    <div id="resume-progress-wrap" class="hidden mt-2">
                        <div class="flex justify-between text-xs text-gray-400 mb-1">
                            <span>Uploading...</span>
                            <span id="resume-progress-pct">0%</span>
                        </div>
                        <div class="progress-bar-wrap">
                            <div class="progress-bar-fill" id="resume-progress-bar"></div>
                        </div>
                    </div>
                </div>

                <!-- Cover Letter -->
                <div>
                    <label class="field-label">Cover Letter Link <span class="badge">Optional</span></label>
                    <div class="icon-input">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                        </svg>
                        <input type="url" id="cover_letter" placeholder="Google Drive, Dropbox link..." class="input-field">
                    </div>
                    <p class="text-xs text-gray-400 mt-1 ml-1">Share a public Google Drive or Dropbox link.</p>
                </div>

                <!-- Intro Video -->
                <div>
                    <label class="field-label">Intro Video Link <span class="badge">Optional</span></label>
                    <div class="icon-input">
                        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                        <input type="url" id="video_link" placeholder="YouTube, Loom, Drive link..." class="input-field">
                    </div>
                    <p class="text-xs text-gray-400 mt-1 ml-1">Share a YouTube, Loom, or Google Drive link.</p>
                </div>

                <!-- Dynamic Questions -->
                <div id="dynamic-questions" class="space-y-5"></div>

                <!-- GDPR -->
                <div class="flex items-start gap-3 p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <input type="checkbox" id="gdpr" required class="mt-1 w-4 h-4 accent-black flex-shrink-0">
                    <label for="gdpr" class="text-xs text-gray-500 leading-relaxed">
                        I consent to my personal data being stored and processed for recruitment purposes. I understand my data will be handled securely and used only for this application. <span class="text-red-400">*</span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">
                    Submit Application
                </button>

            </form>

            <!-- Success -->
            <div id="successMessage" class="hidden text-center py-10 space-y-5">
                <div class="flex justify-center">
                    <div class="bg-green-50 rounded-full p-6">
                        <svg class="w-14 h-14 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                </div>
                <h3 class="text-2xl font-bold text-gray-800" style="font-family:'DM Serif Display',serif">Application Submitted!</h3>
                <p class="text-gray-400 text-sm leading-relaxed">
                    Thank you for applying. Our <span class="font-semibold text-gray-600">HR team</span> will review your details and get back to you soon.
                </p>
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">Your data is encrypted and stored securely.</p>
    </div>

    <script>
        // ✅ APNA SUPABASE URL AUR KEY YAHAN DAALEIN
        const SUPABASE_URL = 'https://byfimmdpdzwfliizcxdk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5ZmltbWRwZHp3ZmxpaXpjeGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MDkwMTcsImV4cCI6MjA4NzI4NTAxN30.Y0yokmfzAj1piZjKfXJC-0E_mUp3NvpD1k7GxxYTKSU';
        const BUCKET_NAME = 'HR Bucket'; // ✅ Supabase Storage bucket ka naam

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const jobId = new URLSearchParams(window.location.search).get('id');

        // --- Resume file selection preview ---
        document.getElementById('resume').addEventListener('change', function () {
            const label = document.getElementById('resume-label');
            const zone = document.getElementById('resume-zone');
            if (this.files[0]) {
                label.innerText = '✅ ' + this.files[0].name;
                label.classList.add('text-green-600', 'font-semibold');
                label.classList.remove('text-gray-400');
                zone.classList.add('has-file');
            }
        });

        // --- Load job details ---
        async function init() {
            if (!jobId) {
                document.getElementById('job-title').innerText = "Invalid Link";
                return;
            }

            const { data, error } = await supabaseClient
                .from('jobs')
                .select('*')
                .eq('id', jobId)
                .single();

            if (error || !data) {
                document.getElementById('job-title').innerText = "Job Not Found";
                return;
            }

            document.getElementById('job-title').innerText = data.job_role;

            const container = document.getElementById('dynamic-questions');
            container.innerHTML = '';
            let qs = data.questions;

            if (typeof qs === 'string') {
                try { qs = JSON.parse(qs); } catch (e) { qs = [qs]; }
            }

            if (Array.isArray(qs)) {
                qs.forEach((q) => {
                    let qText = (typeof q === 'object' && q !== null)
                        ? (q.question_text || q.text || JSON.stringify(q)) : q;
                    if (qText && qText !== "{}" && qText !== "") {
                        const div = document.createElement('div');
                        div.innerHTML = `
                            <label class="field-label">${qText} <span class="text-red-400">*</span></label>
                            <textarea required class="ans input-field" style="min-height:110px;resize:vertical;"></textarea>`;
                        container.appendChild(div);
                    }
                });
            }
        }

        // --- Form Submit ---
        document.getElementById('appForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Uploading Resume...';

            try {
                const resumeFile = document.getElementById('resume').files[0];

                if (!resumeFile) {
                    alert('Please upload your resume.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Application';
                    return;
                }

                // Show progress bar
                document.getElementById('resume-progress-wrap').classList.remove('hidden');

                // Simulate progress during upload
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress = Math.min(progress + 10, 85);
                    document.getElementById('resume-progress-bar').style.width = progress + '%';
                    document.getElementById('resume-progress-pct').innerText = progress + '%';
                }, 200);

                // ✅ Upload resume to Supabase Storage
                const resumePath = `resumes/${Date.now()}_${resumeFile.name.replace(/\s+/g, '_')}`;
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from(BUCKET_NAME)
                    .upload(resumePath, resumeFile, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: resumeFile.type
                    });

                clearInterval(progressInterval);

                if (uploadError) {
                    console.error('Resume upload error:', uploadError);
                    throw new Error('Resume upload failed: ' + uploadError.message);
                }

                // Progress complete
                document.getElementById('resume-progress-bar').style.width = '100%';
                document.getElementById('resume-progress-pct').innerText = '100%';

                // ✅ Get public URL
                const { data: urlData } = supabaseClient.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(resumePath);
                const resumeUrl = urlData.publicUrl;

                submitBtn.innerText = 'Saving Application...';

                // ✅ Collect answers
                const answers = [];
                document.querySelectorAll('.ans').forEach(el => {
                    answers.push(el.value.trim());
                });

                // ✅ Insert into submissions table
                const { error: insertError } = await supabaseClient
                    .from('submissions')
                    .insert({
                        job_id: jobId,
                        full_name: document.getElementById('full_name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        whatsapp_number: document.getElementById('contact').value.trim(),
                        resume_url: resumeUrl,
                        cover_letter_url: document.getElementById('cover_letter').value.trim() || null,
                        video_url: document.getElementById('video_link').value.trim() || null,
                        answers: answers,
                        gdpr_consent: true
                    });

                if (insertError) {
                    console.error('Insert error:', insertError);
                    throw new Error('Failed to save application: ' + insertError.message);
                }

                showSuccess();

            } catch (err) {
                console.error("Submission failed:", err);
                alert('❌ Error: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Application';
                document.getElementById('resume-progress-wrap').classList.add('hidden');
            }
        });

        function showSuccess() {
            document.getElementById('appForm').classList.add('hidden');
            document.getElementById('successMessage').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
